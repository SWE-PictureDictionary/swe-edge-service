server:
  port: 0

spring:
  application:
    name: edge-service

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration: {}
        provider: {}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: content-route-root
              uri: ${CONTENT_SERVICE_URL:http://content-manager}
              predicates:
                - Path=/topics
              filters:
                - SaveSession

            - id: content-route-nested
              uri: ${CONTENT_SERVICE_URL:http://content-manager}
              predicates:
                - Path=/topics/**
              filters:
                - SaveSession

            - id: progress-route-root
              uri: ${PROGRESS_SERVICE_URL:http://progress-manager}
              predicates:
                - Path=/progress
              filters:
                - SaveSession

            - id: progress-route-nested
              uri: ${PROGRESS_SERVICE_URL:http://progress-manager}
              predicates:
                - Path=/progress/**
              filters:
                - SaveSession